<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!--
    Favicon / avatar geométrico del portfolio.
    Diseñado para funcionar en cualquier tamaño:
    - 32×32 como favicon del navegador
    - 180×180 como apple-touch-icon
    - En el nav como logo
    - En GitHub como avatar (si se desea)

    Colores hardcodeados (no variables) porque los SVG
    externos no heredan variables CSS del documento HTML.
  -->

  <!-- Fondo circular -->
  <circle cx="50" cy="50" r="50" fill="#0d0f14"/>

  <!-- Anillo exterior teal sutil -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#3ecfb0" stroke-width="0.8" opacity="0.3"/>

  <!-- Polígono estructural (forma técnica central) -->
  <polygon
    points="50,18 68,32 63,56 37,56 32,32"
    fill="none"
    stroke="#7c6af7"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- Nodo central — punto de acento -->
  <circle cx="50" cy="37" r="8" fill="#7c6af720" stroke="#7c6af7" stroke-width="1.5"/>
  <circle cx="50" cy="37" r="3.5" fill="#7c6af7"/>

  <!-- Línea vertical hacia abajo (conector) -->
  <line x1="50" y1="56" x2="50" y2="70" stroke="#3ecfb0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Base horizontal (suelo) -->
  <line x1="34" y1="70" x2="66" y2="70" stroke="#3ecfb0" stroke-width="1" stroke-linecap="round" opacity="0.7"/>

  <!-- Puntos decorativos en los extremos de la base -->
  <circle cx="34" cy="70" r="2" fill="#3ecfb0" opacity="0.6"/>
  <circle cx="66" cy="70" r="2" fill="#7c6af7" opacity="0.6"/>

  <!-- Destellos de esquina (pequeños trazos en diagonal) -->
  <line x1="28" y1="26" x2="22" y2="20" stroke="#3ecfb0" stroke-width="1" opacity="0.4"/>
  <line x1="72" y1="26" x2="78" y2="20" stroke="#3ecfb0" stroke-width="1" opacity="0.4"/>
  <circle cx="21" cy="19" r="2.5" fill="none" stroke="#3ecfb0" stroke-width="1" opacity="0.5"/>
  <circle cx="79" cy="19" r="2.5" fill="none" stroke="#7c6af7" stroke-width="1" opacity="0.5"/>
</svg>
